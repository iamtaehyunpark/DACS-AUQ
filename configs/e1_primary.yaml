# E1 primary generation (Qwen3.6-35B-A3B): 2 runs -> 4 analysis cells (spec E1★.3).
# entangled_auq -> Cells A+B; decoupled -> Cells C+D. Same 140 seen tasks, same seeds.
run_id_prefix: e1_primary
out_dir: data/trajectories

env:
  alfworld_config: configs/alfworld_base.yaml
  split: eval_in_distribution        # ALFWorld Seen split -> 140 native games

agent:
  base_url: http://127.0.0.1:8000/v1
  model: agent                       # --served-model-name in scripts/serve_agent.sh
  top_logprobs: 20
  ban_think: true                    # decoupled runs only (entangled needs <think> tags)

judge:
  prompt: prompts/judge_redact_fig9.txt
  include_thought: false   # architecture-invariant labels (2026-07-16): actions+observations only
  local:
    base_url: http://127.0.0.1:8001/v1
    model: judge                     # Llama-3.3-70B, scripts/serve_judge.sh
  frontier:
    base_url: https://api.openai.com/v1
    model: gpt-5.2
    api_key_env: OPENAI_API_KEY

sampling:                            # one config across all cells (spec §0.1)
  temperature: 0.7
  top_p: 0.95
  max_tokens: 512

loop:
  step_cap: 50                       # AUQ-matched
  seed_base: 1000                    # seed = 1000 + task_index
  history_window: 0                  # 0 = full history
  history_include_thoughts: false
  max_action_tokens: 80              # command line + <confidence> tag (v2 contract)
  posthoc_numeric_thought: true      # P1 comparator (offline-able)
  posthoc_numeric_action: true
  posthoc_guided: false              # harness-forced format OFF (hides exclusion signal)

tasks: {start: 0, end: 140}

conditions:
  entangled_auq: {arch: entangled, auq_suffix: true}
  decoupled:     {arch: decoupled}
  # reserve (trigger only if Cell A anchor misses AND debugging implicates the suffix):
  entangled_vanilla: {arch: entangled, auq_suffix: false}
