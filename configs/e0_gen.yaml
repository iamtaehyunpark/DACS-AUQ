# E0 judge validation: 30 entangled-primary trajectories -> 150 tau-stratified steps ->
# local judge + frontier pass + 2 human annotators (spec E0, E1★.5 step 1).
run_id_prefix: e0
out_dir: data/trajectories

env:
  alfworld_config: configs/alfworld_base.yaml
  split: eval_in_distribution

agent:
  base_url: http://127.0.0.1:8000/v1
  model: agent
  top_logprobs: 20
  ban_think: true

judge:
  prompt: prompts/judge_redact_fig9.txt
  include_thought: false   # architecture-invariant labels (2026-07-16): actions+observations only
  local:
    base_url: http://127.0.0.1:8001/v1
    model: judge
  frontier:
    # Pre-data amendment 2026-07-20 (no frontier labels existed): served via Azure AI
    # Foundry's OpenAI-compatible v1 route instead of api.openai.com — same model,
    # pre-registered gpt-5.2 (deployment resolves to gpt-5.2-2025-12-11; record the
    # served string in the run report). Key comes from the env, never this file.
    base_url: https://llmjudgejul20-resource.services.ai.azure.com/openai/v1
    model: gpt-5.2
    api_key_env: AZURE_FRONTIER_API_KEY

sampling:
  temperature: 0.7
  top_p: 0.95
  max_tokens: 2048   # 512->2048 (2026-07-16 pre-data amendment): AUQ suffix emits think+action+confidence+explanation in ONE generation; 512 truncated 31% of smoke steps mid-think

loop:
  step_cap: 50
  seed_base: 1000
  history_window: 0
  history_include_thoughts: false
  max_action_tokens: 80
  posthoc_numeric_thought: true
  posthoc_numeric_action: true
  posthoc_guided: false

tasks: {start: 0, end: 30}           # first 30 of the sorted seen split

conditions:
  entangled_auq: {arch: entangled, auq_suffix: true}

e0:
  sample: {n: 150, min_per_cell: 10, seed: 7}
